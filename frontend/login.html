<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
    button { width: 100%; padding: 10px; border-radius: 5px; border: none; background: #007BFF; color: #fff; cursor: pointer; }
    button:hover { background: #0056b3; }
    .message { margin-top: 10px; color: red; font-size: 14px; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8e44ad, #27ae60); /* purple to green gradient */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    .login-container h2 {
      color: #8e44ad; /* purple heading */
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background-color: #27ae60; /* green button */
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #1e8449; /* darker green on hover */
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
      font-weight: bold;
    }
  
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('http://localhost:3000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (data.success) {
          message.style.color = 'green';
          message.textContent = 'Login successful!';
        } else {
          message.style.color = 'red';
          message.textContent = 'Invalid email or password.';
        }
      } catch (err) {
        message.textContent = 'Server error. Try again later.';
      }
    });
  </script>
</body>
</html>
