<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExploitX — Access System</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <canvas id="matrix"></canvas>

  <a href="#" class="back-link">BACK TO HOME</a>

  <div class="panel">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="tick tick-top"></div>
    <div class="tick tick-bottom"></div>
    <div class="tick tick-left"></div>
    <div class="tick tick-right"></div>

    <div class="shield-icon">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4L8 14V34C8 47 18 58 32 62C46 58 56 47 56 34V14L32 4Z"
          fill="rgba(0,255,65,0.1)" stroke="#00ff41" stroke-width="1.5"/>
        <path d="M32 4L8 14V34C8 47 18 58 32 62C46 58 56 47 56 34V14L32 4Z"
          fill="rgba(0,255,65,0.05)" stroke="rgba(0,255,65,0.4)" stroke-width="0.5" stroke-dasharray="2 4"/>
        <polyline points="22,32 29,39 42,26" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>ACCESS SYSTEM</h1>
    <p class="subtitle">&gt; Enter credentials to continue</p>
    <hr class="divider">

    <div class="field-group">
      <label>EMAIL ADDRESS</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 8l10 7 10-7"/>
          </svg>
        </span>
        <input type="email" placeholder="user@exploitx.com" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <div class="field-group">
      <label>PASSWORD</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="pw-input" placeholder="••••••••">
        <button class="toggle-pw" onclick="togglePW()" title="Toggle visibility">
          <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="checkbox-wrap">
        <input type="checkbox" id="remember">
        <span class="custom-check"></span>
        REMEMBER ME
      </label>
      <a href="#" class="forgot">FORGOT PASSWORD?</a>
    </div>

    <button class="btn" onclick="handleLogin(this)">&gt;_ INITIATE LOGIN</button>

    <p class="or-divider">OR</p>
    <p class="register-label">NEW TO EXPLOITX?</p>
    <button class="btn btn-outline">&gt;_ INITIATE REGISTER</button>

    <div class="status-bar">
      <span>&gt; SECURE CONNECTION ESTABLISHED_</span><br>
      <span>&gt; 256-BIT ENCRYPTION ACTIVE_</span>
    </div>
  </div>

  <footer>© 2026 EXPLOITX &nbsp;·&nbsp; EDUCATIONAL CYBERSECURITY PLATFORM</footer>

  <script src="login.js"></script>
</body>
</html>
